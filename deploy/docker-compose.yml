services:
  backend-ts:
    image: dropstation-backend-ts:latest
    container_name: dropstation-backend-ts
    restart: always
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:4200}
      DB_HOST: ${DB_HOST:-127.0.0.1}
      DB_PORT: ${DB_PORT:-3307}
      DB_NAME: ${DB_NAME:-dropstation}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-gotechnies}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-change-me-in-production}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-28800}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3003:3001"
