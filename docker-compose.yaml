version: "2.0"
services:
  web:
    build: docker/php
    container_name: php7_dropstation
    ports:
       - "80:80"
       - "443:443"
    links:
       - db
       - phpmyadmin
    volumes:
      - ./backend:/var/www
      
  db:
    image: mysql:8.0
    container_name: database_dropstation
    ports:
      - 3307:3306
    environment:
      MYSQL_DATABASE: dropstation
      MYSQL_USER: magento2
      MYSQL_PASSWORD: gotechnies
      MYSQL_ROOT_PASSWORD: gotechnies
      MYSQL_ROOT_HOST: "%"
    command:
      - --default-authentication-plugin=mysql_native_password
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_dropstation
    environment:
     - PMA_ARBITRARY=1
    links:
     - db
    ports:
     - 8080:80
    volumes:
     - /sessions
