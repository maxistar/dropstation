name: Dropstation Quality Gates

on:
  pull_request:
    paths:
      - "dropstation/backend-ts/**"
      - "dropstation/nuxt-crud-app/**"
      - "dropstation/.github/workflows/dropstation-quality-gates.yml"
  workflow_dispatch:

jobs:
  backend_ts:
    name: backend-ts lint and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dropstation/backend-ts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dropstation/backend-ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

  nuxt_crud_app:
    name: nuxt-crud-app lint and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dropstation/nuxt-crud-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: dropstation/nuxt-crud-app/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run lint
        run: yarn lint

      - name: Run tests
        run: yarn test:ci
